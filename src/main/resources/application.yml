spring:
  application:
    name: haeyaji-be
  # 실제 키는 gitignore된 application-secret.yml 에서 로드(없으면 무시). 값은 아래 ${ENV:} 로도 주입 가능.
  config:
    import: optional:file:application-secret.yml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:haeyaji_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:haeyaji}
    password: ${MYSQL_PASSWORD:haeyaji12!@}

    hikari:
      driver-class-name: com.mysql.cj.jdbc.Driver
      pool-name: HikariPool
      # Connection
      auto-commit: false
      connection-test-query: SELECT 1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: false
        format_sql: true
        default_batch_fetch_size: 100

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: 1cfea2e7d45ecaf9be374cb0b78a40b1
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: http://localhost:8090/api/login/oauth2/code/kakao
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope: openid, account_email

          naver:
            client-name: muzi-jwt-demo
            client-id: L2mbZIxSFse73rysaEK4
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: http://localhost:8090/api/login/oauth2/code/naver
            authorization-grant-type: authorization_code
            scope: email   # naver: oidc가 아니므로 openid 쓰지않는다

          google:
            client-id: 424369046249-b9f05jn56kdal62plkjhqmh59np77209.apps.googleusercontent.com
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email

        provider:
          kakao:
            issuer-uri: https://kauth.kakao.com
            user-info-uri: https://kapi.kakao.com/v1/oidc/userinfo
            user-name-attribute: sub

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            # 네이버 응답이 { response: { id, email, name } } 형태로 감싸져 있어서
            # CustomOAuth2UserService에서 response를 풀어줘야 함
            user-name-attribute: response

# 임시로 생성해둠 (김현우)
# OAuth2LoginSuccessHandler에서 sendRedirect용도
app:
  frontend:
    callback-url: http://localhost:3000/oauth/callback

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-ms: 60000     # 1분
  refresh-token-validity-ms: 300000

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE # 조회 결과 확인(선택)

server:
  # sapari-be(기본 8080)와 충돌 방지. 필요 시 SERVER_PORT로 override.
  port: ${SERVER_PORT:8090}
  servlet:
    context-path: /api

# 외부 API 연동 설정
haeyaji:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  # nlp 추천 서비스. be가 개인화 프로필·스케줄 맥락을 실어 대행 호출(fe→nlp 직접호출 차단).
  nlp:
    base-url: ${NLP_BASE_URL:http://localhost:8000}
  # 카카오 로컬 API (장소검색·지오코딩). nlp 대행 프록시용 — REST 키는 be가 일원 보유.
  kakao:
    rest-key: ${KAKAO_REST_KEY:}
    base-url: https://dapi.kakao.com
  weather:
    kma:
      auth-key: ${KMA_AUTH_KEY:}
      # 응답 캐시 TTL(분). 같은 좌표·발표시각 재호출 절감.
      cache-ttl-minutes: 30
      # 단기예보(동네예보): 격자(nx,ny) 기반, 오늘~+3일, 시간별.
      base-url: https://apihub.kma.go.kr/api/typ02/openApi/VilageFcstInfoService_2.0
      mid:
        # 중기육상예보(getMidLandFcst): 지역코드 기반, +4~+10일 하늘상태·강수확률(JSON).
        land-base-url: https://apihub.kma.go.kr/api/typ02/openApi/MidFcstInfoService
        # 중기기온(fct_afs_wc.php): 지역코드 기반, 최저/최고기온(텍스트).
        ta-base-url: https://apihub.kma.go.kr/api/typ01/url
    # data.go.kr 공용 서비스키 (생활기상지수 UV + 에어코리아 미세먼지, 계정당 1키). 보강용.
    datakr:
      service-key: ${DATA_GO_KR_SERVICE_KEY:}
    # 자외선지수(생활기상지수 getUVIdxV5 = 조회서비스 3.0): data.go.kr.
    uv:
      base-url: https://apis.data.go.kr/1360000/LivingWthrIdxServiceV5
    # 미세먼지(에어코리아 getCtprvnRltmMesureDnsty): data.go.kr.
    airquality:
      base-url: https://apis.data.go.kr/B552584/ArpltnInforInqireSvc
      # 측정소정보(getMsrstnList): 측정소 좌표 목록 → 최근접 측정소 매칭용.
      station-base-url: https://apis.data.go.kr/B552584/MsrstnInfoInqireSvc
